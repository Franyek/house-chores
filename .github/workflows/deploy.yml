name: iOS CI/CD

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    name: Build and Test
    runs-on: macos-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Build
      run: |
        xcodebuild clean build \
          -project HouseChores.xcodeproj \
          -scheme HouseChores \
          -destination 'platform=iOS Simulator,name=iPhone 16,OS=latest'

    - name: Run Tests
      run: |
        xcodebuild test \
          -project HouseChores.xcodeproj \
          -scheme HouseChores \
          -destination 'platform=iOS Simulator,name=iPhone 16,OS=latest'

  deploy-testflight:
    name: Deploy to TestFlight
    runs-on: macos-latest
    needs: build-and-test
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Import Certificate
      env:
        CERTIFICATE_BASE64: ${{ secrets.DISTRIBUTION_CERTIFICATE_BASE64 }}
        CERTIFICATE_PASSWORD: ${{ secrets.CERTIFICATE_PASSWORD }}
      run: |
        # Create keychain
        security create-keychain -p actions temp.keychain
        security default-keychain -s temp.keychain
        security unlock-keychain -p actions temp.keychain
        security set-keychain-settings -t 3600 -u temp.keychain

        # Import certificate
        echo $CERTIFICATE_BASE64 | base64 --decode > certificate.p12
        security import certificate.p12 -k temp.keychain -P $CERTIFICATE_PASSWORD -T /usr/bin/codesign -T /usr/bin/security
        security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k actions temp.keychain

        # Clean up
        rm certificate.p12

    - name: Install Fastlane
      run: |
        gem install fastlane

    - name: Build and Upload to TestFlight
      env:
        APPLE_ID: ${{ secrets.APPLE_ID }}
        APP_SPECIFIC_PASSWORD: ${{ secrets.APP_SPECIFIC_PASSWORD }}
        TEAM_ID: ${{ secrets.TEAM_ID }}
      run: |
        # Build the app
        xcodebuild -project HouseChores.xcodeproj \
          -scheme HouseChores \
          -configuration Release \
          -archivePath $PWD/build/HouseChores.xcarchive \
          -destination 'generic/platform=iOS' \
          clean archive
        
        # Export for App Store
        xcodebuild -archivePath $PWD/build/HouseChores.xcarchive \
          -exportArchive \
          -exportPath $PWD/build \
          -exportOptionsPlist ExportOptions.plist
        
        # Upload to TestFlight
        xcrun altool --upload-app \
          --type ios \
          --file $PWD/build/*.ipa \
          --username "$APPLE_ID" \
          --password "$APP_SPECIFIC_PASSWORD"

    - name: Cleanup Keychain
      if: always()
      run: |
        security delete-keychain temp.keychain || true
